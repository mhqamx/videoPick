name: video_pick
description: 多平台短视频/图文无水印下载工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  cupertino_http: ^2.1.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  photo_manager: ^3.0.0
  video_player: ^2.9.0
  share_plus: ^9.0.0
  shared_preferences: ^2.3.0
  photo_view: ^0.15.0
  provider: ^6.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
